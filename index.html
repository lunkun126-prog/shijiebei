<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ 世界杯 2026 · 实时胜率</title>
  <meta name="description" content="世界杯 2026 每日场次与胜率(博彩赔率去水位反推),仅供娱乐参考。" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 背景:足球绕轨道公转(致敬"多维"天体运行) -->
  <div class="space" aria-hidden="true">
    <div class="glow"></div>
    <div class="disc">
      <div class="ring" style="--d:28vmin"></div>
      <div class="ring" style="--d:46vmin"></div>
      <div class="ring" style="--d:64vmin"></div>
      <div class="ring" style="--d:84vmin"></div>
      <div class="arm" style="--d:28vmin;--t:17s;animation-delay:-3s">
        <div class="orbwrap"><span class="orb" style="font-size:20px">⚽</span></div></div>
      <div class="arm" style="--d:46vmin;--t:24s;animation-delay:-11s">
        <div class="orbwrap"><span class="orb" style="font-size:26px">⚽</span></div></div>
      <div class="arm" style="--d:64vmin;--t:33s;animation-delay:-7s">
        <div class="orbwrap"><span class="orb" style="font-size:22px">⚽</span></div></div>
      <div class="arm" style="--d:84vmin;--t:44s;animation-delay:-20s">
        <div class="orbwrap"><span class="orb" style="font-size:30px">⚽</span></div></div>
    </div>
  </div>

  <!-- 朋友合影做成的足球:放在内容两侧空白处, 垂直居中 -->
  <div class="side-ball left" aria-hidden="true">
    <img src="assets/ball.png" alt="" /><span>徐总发发发</span>
  </div>
  <div class="side-ball right" aria-hidden="true">
    <img src="assets/ball.png" alt="" /><span>徐总发发发</span>
  </div>

  <header class="topbar">
    <h1>⚽ 世界杯 2026 · 实时胜率</h1>
    <p class="subtitle">胜率由全球博彩赔率去水位反推 · 市场共识 · 仅供娱乐参考</p>
  </header>

  <nav id="dateTabs" class="date-tabs" aria-label="日期切换"></nav>

  <section class="calc" id="calc">
    <div class="calc-title">💰 盈利计算器
      <span class="calc-sub">点下方任意赔率自动带入 · 买比分就手动填倍率</span>
    </div>
    <div class="calc-row">
      <label>本金(元)
        <input id="stake" type="number" inputmode="decimal" min="0" placeholder="输入本金,如 100" />
      </label>
      <label>倍率(赔率)
        <input id="odd" type="number" inputmode="decimal" min="1" step="0.01" placeholder="点赔率自动填,或手填" />
      </label>
    </div>
    <div class="calc-bet" id="calcBet"></div>
    <div class="calc-result" id="calcResult">输入本金和倍率,自动算出能拿回多少、净赚多少</div>
  </section>

  <section class="recs" id="recs" hidden>
    <div class="recs-title">📌 今日示例买法 <span class="recs-sub">稳健向 · 胜平负/让球/大小球/比分/串关 · 拿 ¥100 举例 · 仅供娱乐非投注建议</span></div>
    <div class="recs-list" id="recsList"></div>
  </section>

  <main id="board" class="board">
    <div class="state" id="loadingState">加载中…</div>
  </main>

  <!-- 手机上没有侧边空白, 在内容流里居中显示一颗合影球 -->
  <div class="mobile-ball" aria-hidden="true">
    <img src="assets/ball.png" alt="" /><span>徐总发发发</span>
  </div>

  <footer class="footer">
    <p id="updatedAt">—</p>
    <p class="disclaimer">
      ⚠️ 胜率由博彩赔率反推(已去水位),仅供娱乐参考,<strong>非投注建议</strong>。
      足球胜负预测准确率天花板约 50–55%,理性看球。
    </p>
    <p class="credit">数据源 the-odds-api.com · 开源于 GitHub</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
